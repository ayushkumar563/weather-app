<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app-container">
        <header>
            <h1>Weather App</h1>
            <p>Get real-time weather updates</p>
        </header>

        <section class="search-section">
            <input type="text" id="city-input" placeholder="Enter city name..." autocomplete="off">
            <button id="search-btn">Search</button>
        </section>

        <section id="error-message" class="hidden error"></section>

        <section id="weather-info" class="hidden weather-card">
            <h2 id="city-name">--</h2>
            <div class="weather-details">
                <div class="temperature">
                    <span id="temp-value">--</span>°C
                </div>
                <div class="condition" id="weather-condition">--</div>
                <div class="extra-details">
                    <p>Wind: <span id="wind-speed">--</span> km/h</p>
                    <p>Humidity: <span id="humidity">--</span>%</p>
                </div>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
